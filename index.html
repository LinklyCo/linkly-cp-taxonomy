<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linkly CP Product Taxonomy - v3 Hypothesis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --blue-50:#E6F1FB;--blue-100:#B5D4F4;--blue-700:#185FA5;--blue-800:#0C447C;
  --blue2-bg:#DBEAFE;--blue2-text:#1e40af;
  --teal-50:#E1F5EE;--teal-100:#9FE1CB;--teal-400:#1D9E75;--teal-700:#0F6E56;--teal-800:#085041;
  --amber-50:#FAEEDA;--amber-100:#FAC775;--amber-700:#854F0B;--amber-800:#633806;
  --purple-50:#EEEDFE;--purple-100:#CECBF6;--purple-700:#534AB7;--purple-800:#3C3489;
  --red-50:#FCEBEB;--red-100:#F7C1C1;--red-700:#A32D2D;
  --green-50:#EAF3DE;--green-100:#C0DD97;--green-700:#3B6D11;--green-800:#27500A;
  --gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-150:#E2E8F0;--gray-200:#CBD5E1;
  --gray-400:#94A3B8;--gray-500:#64748B;--gray-700:#334155;--gray-900:#0F172A;
 
  --font:'DM Sans',sans-serif;
  --font-head:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
}
 
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body { font-family: var(--font); background: var(--gray-100); color: var(--gray-900); min-height: 100vh; }
 
/* PAGE HEADER */
.page-header {
  background: var(--gray-900);
  padding: 20px 56px 0;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid #1E293B;
}
.header-inner { display: flex; align-items: stretch; justify-content: space-between; }
.header-brand { display: flex; align-items: center; gap: 14px; padding: 18px 0 0; }
.brand-mark { display: none; }
.header-text {}
.page-title { font-size: 15px; font-weight: 500; color: #fff; letter-spacing: -.01em; }
.page-meta { font-size: 11px; color: #64748B; margin-top: 3px; font-family: var(--mono); }
.header-right { display: flex; align-items: center; gap: 8px; padding-bottom: 18px; }
.page-badge { font-size: 10px; font-weight: 500; padding: 4px 10px; border-radius: 4px; background: #1E293B; color: #94A3B8; border: 1px solid #334155; }
.main-tabs { display: flex; align-items: flex-end; gap: 0; padding-top: 12px; }
.main-tab { font-family: var(--font); font-size: 12.5px; font-weight: 500; padding: 11px 22px; cursor: pointer; color: #64748B; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; user-select: none; }
.main-tab:hover { color: #94A3B8; }
.main-tab.active { color: #fff; border-bottom-color: #fff; }
 
/* MAIN */
.main { padding: 36px 56px 80px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
 
/* SECTION NAV */
.section-nav { display: flex; gap: 8px; margin-bottom: 28px; align-items: center; }
.section-btn {
  font-family: var(--font); font-size: 12px; font-weight: 500;
  padding: 7px 18px; border-radius: 20px; cursor: pointer;
  border: 1px solid var(--gray-200); background: #fff; color: var(--gray-500);
  transition: all .15s; user-select: none;
}
.section-btn:hover { border-color: var(--teal-100); color: var(--teal-700); }
.section-btn.active { background: var(--gray-900); color: #fff; border-color: var(--gray-900); }
.section-panel { display: none; }
.section-panel.active { display: block; }
 
.mode-nav { display: flex; gap: 8px; margin-bottom: 24px; align-items: center; }
.mode-btn {
  font-family: var(--font); font-size: 12px; font-weight: 500;
  padding: 6px 16px; border-radius: 7px; cursor: pointer;
  border: 1px solid var(--gray-200); background: #fff; color: var(--gray-500);
  transition: all .15s; user-select: none;
}
.mode-btn:hover { border-color: var(--gray-400); color: var(--gray-700); }
.mode-btn.active { background: var(--gray-700); color: #fff; border-color: var(--gray-700); }
.mode-panel { display: none; }
.mode-panel.active { display: block; }
 
/* LEGEND */
.legend {
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  margin-bottom: 28px; padding: 12px 20px;
  background: #fff; border: 1px solid var(--gray-150); border-radius: 10px;
}
.legend-title { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; color: var(--gray-400); margin-right: 4px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--gray-500); }
 
/* GRID */
.products-scroll { overflow-x: auto; padding-bottom: 20px; }
.products-grid { display: grid; gap: 16px; min-width: max-content; }
.grid-3 { grid-template-columns: repeat(3, 360px); }
.grid-2 { grid-template-columns: repeat(2, 420px); }
.grid-1 { grid-template-columns: 620px; }
.scroll-hint { font-size: 11px; color: var(--gray-400); margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
 
/* PRODUCT CARD */
.prod {
  background: #fff; border: 1px solid var(--gray-150); border-radius: 14px;
  overflow: hidden; display: flex; flex-direction: column;
  transition: box-shadow .15s, transform .1s;
}
.prod:hover { box-shadow: 0 6px 32px rgba(2,64,65,.08); }
.prod.eol { opacity: .93; }
.prod.featured { border-width: 1.5px; border-color: var(--teal-400); }
.prod.emerging-card { border-width: 1.5px; border-color: var(--purple-100); }
 
/* HEADER */
.prod-hdr { padding: 18px 20px 16px; border-bottom: 1px solid var(--gray-150); }
.hdr-top { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 10px; }
.status-chips { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
.status-chip { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 4px; white-space: nowrap; }
.prod-name {
  font-family: var(--font-head); font-size: 20px; font-weight: 500;
  letter-spacing: -.025em; margin-bottom: 10px; color: var(--gray-900);
  line-height: 1.1;
}
.prod-name .eol-label { font-size: 12px; font-weight: 400; color: var(--red-700); margin-left: 8px; font-family: var(--font); }
.archetype {
  font-size: 12px; color: var(--gray-500); line-height: 1.65;
  font-style: italic; padding: 10px 12px;
  background: var(--gray-50); border-radius: 7px;
  border-left: 2.5px solid var(--gray-200);
}
 
/* BANNERS */
.orbit-banner { background: var(--teal-50); border-bottom: 1px solid var(--teal-100); padding: 9px 18px; display: flex; gap: 9px; align-items: flex-start; }
.orbit-banner-dot { width: 7px; height: 7px; background: var(--teal-700); border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.orbit-banner-text { font-size: 11px; color: var(--teal-700); line-height: 1.55; }
.emerging-banner { background: var(--purple-50); border-bottom: 1px solid var(--purple-100); padding: 9px 18px; display: flex; gap: 9px; align-items: flex-start; }
.emerging-banner-dot { width: 7px; height: 7px; background: var(--purple-700); border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.emerging-banner-text { font-size: 11px; color: var(--purple-800); line-height: 1.55; }
.eol-strip { background: var(--red-50); border-bottom: 1px solid var(--red-100); padding: 8px 18px; display: flex; align-items: center; gap: 9px; }
.eol-strip-dot { width: 7px; height: 7px; background: var(--red-700); border-radius: 50%; flex-shrink: 0; }
.eol-strip-text { font-size: 11px; color: var(--red-700); font-weight: 500; }
 
/* MODES ROW */
.modes-row {
  padding: 10px 18px; background: var(--gray-50);
  border-bottom: 1px solid var(--gray-150);
  display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
}
.modes-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--gray-400); margin-right: 3px; }
.mode-pill { font-size: 10px; font-weight: 500; padding: 3px 10px; border-radius: 10px; border: 1px solid; white-space: nowrap; }
.mpill-std { background: var(--green-50); color: var(--green-700); border-color: var(--green-100); }
.mpill-add { background: var(--amber-50); color: var(--amber-700); border-color: var(--amber-100); }
.mpill-na { background: var(--gray-100); color: var(--gray-400); border-color: var(--gray-150); }
.mode-note { font-size: 10px; color: var(--gray-400); font-style: italic; margin-top: 3px; width: 100%; }
 
/* BODY */
.prod-body { display: flex; flex-direction: column; flex: 1; }
.sect { padding: 14px 18px; border-bottom: 1px solid var(--gray-150); }
.sect:last-child { border-bottom: none; }
.sect-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .07em; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 7px; }
.item:last-child { margin-bottom: 0; }
.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
.item-text { font-size: 12px; color: var(--gray-500); line-height: 1.6; flex: 1; }
.item-text strong { font-weight: 500; color: var(--gray-700); }
.item-text .note { font-size: 11px; color: var(--gray-400); }
 
/* PRICE BADGE */
.price {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  padding: 2px 7px; border-radius: 4px; white-space: nowrap;
  flex-shrink: 0; margin-top: 1px;
}
.price-real { background: var(--green-50); color: var(--green-800); border: 1px solid var(--green-100); }
.price-proposed { background: var(--gray-100); color: var(--gray-500); border: 1px solid var(--gray-200); font-style: italic; }
.price-tbd { background: var(--gray-100); color: var(--gray-400); border: 1px dashed var(--gray-200); }
 
.ctags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.ctag {
  font-size: 10px; padding: 3px 8px; border-radius: 4px;
  background: var(--gray-100); color: var(--gray-500);
  border: 1px solid var(--gray-150); font-family: var(--mono);
}
.ctag.eol-tag { text-decoration: line-through; opacity: .45; }
.ctag.dim { opacity: .55; }
.qref {
  font-size: 9px; font-weight: 500; padding: 1px 5px; border-radius: 3px;
  background: var(--amber-50); color: var(--amber-700);
  border: 1px solid var(--amber-100); font-family: var(--mono);
  vertical-align: middle; margin-left: 3px; cursor: default;
}
.rev-badge {
  display: inline-block; font-family: var(--mono);
  font-size: 15px; font-weight: 500; color: var(--gray-900); margin-bottom: 5px;
}
 
/* TECH ROW */
.tech-row {
  background: var(--gray-50); border-top: 1px dashed var(--gray-200);
  padding: 12px 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.tech-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 7px; }
.t-chip {
  font-size: 9px; font-weight: 500; padding: 1px 5px; border-radius: 3px;
  font-family: var(--mono); margin-left: 3px; vertical-align: middle;
}
 
/* 2-COL GRID for wide cards */
.two-col-body { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.two-col-body .sect { border-right: 1px solid var(--gray-150); border-bottom: 1px solid var(--gray-150); }
.two-col-body .sect:nth-child(even) { border-right: none; }
.two-col-body .sect:nth-last-child(-n+2) { border-bottom: none; }
 
/* PRICING NOTE */
.pricing-note {
  font-size: 10.5px; color: var(--gray-400); padding: 10px 18px;
  background: var(--gray-50); border-top: 1px solid var(--gray-150); font-style: italic;
}
 
/* STRATEGIC QUESTIONS */
.sq-section { padding: 36px 56px 80px; }
.sq-title {
  font-family: var(--font-head); font-size: 12px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .09em; color: var(--gray-400);
  margin-bottom: 24px; display: flex; align-items: center; gap: 12px;
}
.sq-title::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
.sq-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.sq-card {
  background: #fff; border: 1px solid var(--gray-150); border-radius: 10px;
  padding: 16px 18px; transition: box-shadow .15s;
}
.sq-card:hover { box-shadow: 0 3px 16px rgba(2,64,65,.07); }
.sq-num {
  font-family: var(--mono); font-size: 10px; font-weight: 500; padding: 2px 7px;
  border-radius: 4px; background: var(--amber-50); color: var(--amber-700);
  border: 1px solid var(--amber-100); display: inline-block; margin-bottom: 10px;
}
.sq-q { font-family: var(--font-head); font-size: 13px; font-weight: 500; color: var(--gray-900); margin-bottom: 7px; line-height: 1.4; }
.sq-body { font-size: 12px; color: var(--gray-500); line-height: 1.7; }
.sq-resolved { border-left: 3px solid var(--green-700); }
.sq-resolved .sq-num { background: var(--green-50); color: var(--green-800); border-color: var(--green-100); }
 
/* COLOR SHORTCUTS */
.c-teal { color: var(--teal-800); }
.c-blue2 { color: var(--blue2-text); }
.c-teal { color: var(--teal-700); }
.c-teal2 { color: var(--teal-800); }
.c-amber { color: var(--amber-800); }
.c-purple { color: var(--purple-800); }
.c-red { color: var(--red-700); }
.c-green { color: var(--green-700); }
.c-blue { color: var(--blue-700); }
 
.bg-teal { background: var(--teal-50); color: var(--teal-800); }
.bg-blue2 { background: var(--blue2-bg); color: var(--blue2-text); }
.bg-blue { background: var(--blue-50); color: var(--blue-700); }
.bg-teal { background: var(--teal-50); color: var(--teal-700); }
.bg-teal2 { background: var(--teal-100); color: var(--teal-800); }
.bg-amber { background: var(--amber-50); color: var(--amber-800); }
.bg-purple { background: var(--purple-50); color: var(--purple-800); }
.bg-red { background: var(--red-50); color: var(--red-700); }
.bg-green { background: var(--green-50); color: var(--green-800); }
 
.dot-teal { background: var(--teal-700); }
.dot-blue2 { background: var(--blue2-text); }
.dot-blue { background: var(--blue-700); }
.dot-teal { background: var(--teal-700); }
.dot-teal2 { background: var(--teal-800); }
.dot-amber { background: var(--amber-700); }
.dot-purple { background: var(--purple-700); }
.dot-red { background: var(--red-700); }
.dot-green { background: var(--green-700); }
.dot-gray { background: var(--gray-200); }
 
/* SPEC SHEET */
.sc-scroll { overflow-x: auto; border-radius: 12px; border: 1px solid var(--gray-200); background: #fff; margin-bottom: 20px; }
.sc-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.sc-table col.sc-feat { width: 230px; }
.sc-table col.sc-prod { width: 112px; }
.sc-prod-hdr th { padding: 0; border-bottom: 1px solid var(--gray-200); vertical-align: bottom; }
.sc-feat-hdr { background: var(--gray-50); }
.sc-feat-hdr { padding: 12px 16px; text-align: left; background: var(--gray-50); border-right: 1px solid var(--gray-200); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; color: var(--gray-400); }
.sc-ph-inner { padding: 10px 6px 9px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.sc-pname { font-size: 11px; font-weight: 500; white-space: nowrap; }
.sc-psub { font-size: 9px; opacity: .75; white-space: nowrap; }
.sc-eol-tag { font-size: 8px; font-weight: 500; padding: 1px 5px; border-radius: 3px; background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1; }
.sc-section td { padding: 8px 16px; background: var(--gray-100); border-top: 2px solid var(--gray-200); border-bottom: 1px solid var(--gray-200); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; color: var(--gray-500); }
tr.sc-row { height: 40px; border-bottom: 1px solid var(--gray-100); }
tr.sc-row:hover { background: #FAFBFC; }
tr.sc-row:last-child { border-bottom: none; }
.sc-fc { padding: 6px 16px; vertical-align: middle; border-right: 1px solid var(--gray-200); }
.sc-fn { font-size: 11px; color: var(--gray-700); white-space: normal; word-break: normal; }
.sc-fn-sub { font-size: 10px; color: var(--gray-400); margin-top: 1px; }
.sc-vc { text-align: center; vertical-align: middle; border-right: 1px solid var(--gray-100); padding: 0 3px; }
.sc-vc:last-child { border-right: none; }
.sc-vc.sc-eol { opacity: .42; }
.v-s { display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:5px;background:var(--sc-std-bg);border:1px solid var(--sc-std-b); }
.v-s svg { width:12px;height:12px;stroke:var(--sc-std);stroke-width:2.5;fill:none; }
.v-a { display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:5px;background:var(--sc-add-bg);border:1px solid var(--sc-add-b);font-size:12px;font-weight:600;color:var(--sc-add); }
.v-n { display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:5px;background:var(--sc-na-bg);border:1px solid var(--gray-200);font-size:13px;color:var(--sc-na); }
.v-t { font-size:10px;font-weight:500;font-family:var(--mono);padding:2px 6px;border-radius:4px;background:var(--gray-100);color:var(--gray-500);white-space:nowrap; }
.v-t.g { background:#F0FDF4;color:#16A34A; }
.v-t.a { background:#FFFBEB;color:#B45309; }
.v-t.gr { background:var(--sc-na-bg);color:var(--sc-na); }
.v-t.p { background:#EDE9FE;color:#5B21B6; }
.sc-legend { display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:24px;padding:10px 16px;background:#fff;border:1px solid var(--gray-200);border-radius:8px; }
.sc-leg-title { font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400); }
.sc-leg-item { display:flex;align-items:center;gap:7px;font-size:12px;color:var(--gray-500); }
.sc-footnote { font-size:11px;color:var(--gray-400);line-height:1.7;margin-top:14px; }
.sc-footnote span { display:block; }
.sc-sub-nav { display:flex;gap:8px;margin-bottom:18px; }
.sc-sub-btn { font-size:11px;font-weight:500;padding:5px 14px;border-radius:6px;cursor:pointer;border:1px solid var(--gray-200);background:#fff;color:var(--gray-500);transition:all .15s;user-select:none; }
.sc-sub-btn:hover { border-color:var(--gray-300);color:var(--gray-700); }
.sc-sub-btn.active { background:var(--gray-700);color:#fff;border-color:var(--gray-700); }
.sc-sub-panel { display:none; }
.sc-sub-panel.active { display:block; }
 
/* CUSTOMER TOOLTIP */
.ctag { cursor: default; }
.ctag[data-tip] { cursor: help; }
#ctip {
  position: fixed; z-index: 9999; pointer-events: none;
  background: #0F172A; color: #fff;
  font-size: 11px; font-family: var(--mono);
  padding: 8px 12px; border-radius: 7px;
  white-space: pre; line-height: 1.65;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
  display: none;
}
/* REQUIRES INVESTIGATION badge */
.price-inv { background: #FFF7ED; color: #C2410C; border: 1px solid #FDBA74; font-style: italic; }
</style>

  const ITERATIONS = 600000;
 
  function b64ToBytes(b64) {
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }
 
  async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      'raw', enc.encode(password),
      { name: 'PBKDF2' },
      false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-256' },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      false, ['decrypt']
    );
  }
 
  async function tryUnlock(password) {
    const blob = b64ToBytes(ENCRYPTED_BLOB);
    const salt = blob.slice(0, 16);
    const iv = blob.slice(16, 28);
    const ciphertext = blob.slice(28);
    const key = await deriveKey(password, salt);
    const plaintext = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv },
      key, ciphertext
    );
    return new TextDecoder().decode(plaintext);
  }
 
  function reExecuteScripts(container) {
    // innerHTML doesn't run <script> tags; clone-and-replace to force execution.
    const scripts = container.querySelectorAll('script');
    scripts.forEach(oldScript => {
      const newScript = document.createElement('script');
      // Copy attributes (e.g. src)
      for (const attr of oldScript.attributes) {
        newScript.setAttribute(attr.name, attr.value);
      }
      newScript.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }
 
  async function unlock() {
    const input = document.getElementById('pgPassword');
    const button = document.getElementById('pgUnlock');
    const error = document.getElementById('pgError');
    const password = input.value;
    if (!password) { error.textContent = 'Enter password.'; return; }
 
    error.textContent = '';
    button.disabled = true;
    button.textContent = 'Unlocking...';
 
    try {
      const decrypted = await tryUnlock(password);
      // Replace body content with decrypted HTML
      document.body.innerHTML = decrypted;
      // Re-execute embedded scripts (tab switching, etc.)
      reExecuteScripts(document.body);
    } catch (err) {
      button.disabled = false;
      button.textContent = 'Unlock';
      error.textContent = 'Wrong password.';
      input.value = '';
      input.focus();
    }
  }
 
  document.addEventListener('DOMContentLoaded', () => {
    const button = document.getElementById('pgUnlock');
    const input = document.getElementById('pgPassword');
    button.addEventListener('click', unlock);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') unlock();
    });
  });
})();
